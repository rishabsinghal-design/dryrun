<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator" role="application" aria-label="Calculator">

      <!-- Display -->
      <div class="display">
        <div class="display__expression" id="expression" aria-live="polite"></div>
        <div class="display__result"   id="result"     aria-live="polite">0</div>
      </div>

      <!-- Buttons -->
      <div class="buttons">

        <!-- Row 1 -->
        <button class="btn btn--action" data-action="clear"     aria-label="Clear">AC</button>
        <button class="btn btn--action" data-action="sign"      aria-label="Toggle sign">+/−</button>
        <button class="btn btn--action" data-action="percent"   aria-label="Percent">%</button>
        <button class="btn btn--operator" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn--digit" data-action="digit" data-value="7">7</button>
        <button class="btn btn--digit" data-action="digit" data-value="8">8</button>
        <button class="btn btn--digit" data-action="digit" data-value="9">9</button>
        <button class="btn btn--operator" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn--digit" data-action="digit" data-value="4">4</button>
        <button class="btn btn--digit" data-action="digit" data-value="5">5</button>
        <button class="btn btn--digit" data-action="digit" data-value="6">6</button>
        <button class="btn btn--operator" data-action="operator" data-value="−" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn--digit" data-action="digit" data-value="1">1</button>
        <button class="btn btn--digit" data-action="digit" data-value="2">2</button>
        <button class="btn btn--digit" data-action="digit" data-value="3">3</button>
        <button class="btn btn--operator" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn--digit btn--zero" data-action="digit" data-value="0">0</button>
        <button class="btn btn--digit" data-action="decimal" aria-label="Decimal point">.</button>
        <button class="btn btn--equals" data-action="equals" aria-label="Equals">=</button>

      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
