<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator" role="application" aria-label="Calculator">

    <!-- Display -->
    <div class="display" aria-live="polite">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Button grid -->
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn btn-func"  data-action="clear"   aria-label="All Clear">AC</button>
      <button class="btn btn-func"  data-action="sign"    aria-label="Toggle sign">+/−</button>
      <button class="btn btn-func"  data-action="percent" aria-label="Percent">%</button>
      <button class="btn btn-op"    data-action="op"      data-value="÷" aria-label="Divide">÷</button>

      <!-- Row 2 -->
      <button class="btn btn-digit" data-action="digit"   data-value="7">7</button>
      <button class="btn btn-digit" data-action="digit"   data-value="8">8</button>
      <button class="btn btn-digit" data-action="digit"   data-value="9">9</button>
      <button class="btn btn-op"    data-action="op"      data-value="×" aria-label="Multiply">×</button>

      <!-- Row 3 -->
      <button class="btn btn-digit" data-action="digit"   data-value="4">4</button>
      <button class="btn btn-digit" data-action="digit"   data-value="5">5</button>
      <button class="btn btn-digit" data-action="digit"   data-value="6">6</button>
      <button class="btn btn-op"    data-action="op"      data-value="−" aria-label="Subtract">−</button>

      <!-- Row 4 -->
      <button class="btn btn-digit" data-action="digit"   data-value="1">1</button>
      <button class="btn btn-digit" data-action="digit"   data-value="2">2</button>
      <button class="btn btn-digit" data-action="digit"   data-value="3">3</button>
      <button class="btn btn-op"    data-action="op"      data-value="+" aria-label="Add">+</button>

      <!-- Row 5 -->
      <button class="btn btn-digit btn-zero" data-action="digit" data-value="0">0</button>
      <button class="btn btn-digit" data-action="decimal" aria-label="Decimal point">.</button>
      <button class="btn btn-op btn-equals"  data-action="equals" aria-label="Equals">=</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
