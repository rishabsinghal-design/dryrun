[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options:
#   -v            verbose output (shows each test name)
#   --tb=short    concise tracebacks
#   --durations=0 show timing for every test (NFR-1 / AC-10)
addopts =
    -v
    --tb=short
    --durations=0
    --cov=calculator
    --cov-report=term-missing
    --cov-fail-under=90
